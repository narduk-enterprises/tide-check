name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  # ── Shared setup: install, build plugins, prepare types, cache ──

  setup:
    name: Prepare Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build ESLint plugins
        run: pnpm run build:plugins

      - name: Prepare Nuxt types
        run: |
          for cfg in apps/*/nuxt.config.ts layers/*/nuxt.config.ts; do
            [ -f "$cfg" ] || continue
            dir="$(dirname "$cfg")"
            echo "::group::nuxt prepare — $dir"
            (cd "$dir" && pnpm exec nuxt prepare)
            echo "::endgroup::"
          done

      - name: Cache prepared workspace
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

  # ── Parallel quality jobs ──

  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Lint
        run: pnpm -r run lint

  typecheck:
    name: Typecheck
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Typecheck
        run: pnpm -r run typecheck

  test:
    name: Unit Tests
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Unit Tests
        run: pnpm -r --if-present test:unit

  # ── Deploy pipeline (push to main only) ──

  preflight:
    name: Preflight
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      method: ${{ steps.creds.outputs.method }}
      deploy-web: ${{ steps.changes.outputs.deploy-web }}
      deploy-examples: ${{ steps.changes.outputs.deploy-examples }}
      deploy-showcase: ${{ steps.changes.outputs.deploy-showcase }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate credentials
        id: creds
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$DOPPLER_TOKEN" ]; then
            echo "method=doppler" >> "$GITHUB_OUTPUT"
            echo "✓ Using Doppler (hub-and-spoke) for secret resolution"
          elif [ -n "$CF_API" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "method=direct" >> "$GITHUB_OUTPUT"
            echo "✓ Using direct Cloudflare credentials"
          else
            echo "::error::No deployment credentials configured."
            echo "Configure DOPPLER_TOKEN (recommended) or CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

      - name: Detect deployable changes
        id: changes
        run: |
          # Files/dirs that do NOT require any deploy
          INFRA_ONLY='\.github/|\.agents/|tools/|\.template-version|renovate\.json|turbo\.json|doppler\.yaml|\.gitignore|README|LICENSE|packages/eslint-config/'

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FORCE_DEPLOY")

          if [ "$CHANGED" = "FORCE_DEPLOY" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy-web=true" >> $GITHUB_OUTPUT
            echo "deploy-examples=true" >> $GITHUB_OUTPUT
            echo "deploy-showcase=true" >> $GITHUB_OUTPUT
            echo "⚡ Force deploy (workflow_dispatch or no parent commit)"
            exit 0
          fi

          # Check if only infra files changed
          APP_CHANGES=$(echo "$CHANGED" | grep -vE "$INFRA_ONLY" || true)
          if [ -z "$APP_CHANGES" ]; then
            echo "deploy-web=false" >> $GITHUB_OUTPUT
            echo "deploy-examples=false" >> $GITHUB_OUTPUT
            echo "deploy-showcase=false" >> $GITHUB_OUTPUT
            echo "⏭️ Only infra/tooling changes — skipping all deploys"
            echo "$CHANGED" | head -10
            exit 0
          fi

          # Layer changes affect everything
          if echo "$APP_CHANGES" | grep -qE '^layers/'; then
            echo "deploy-web=true" >> $GITHUB_OUTPUT
            echo "deploy-examples=true" >> $GITHUB_OUTPUT
            echo "deploy-showcase=true" >> $GITHUB_OUTPUT
            echo "✅ Layer changes — deploying everything"
            exit 0
          fi

          # Root package.json / lockfile changes affect everything
          if echo "$APP_CHANGES" | grep -qE '^(package\.json|pnpm-lock\.yaml)$'; then
            echo "deploy-web=true" >> $GITHUB_OUTPUT
            echo "deploy-examples=true" >> $GITHUB_OUTPUT
            echo "deploy-showcase=true" >> $GITHUB_OUTPUT
            echo "✅ Root dependency changes — deploying everything"
            exit 0
          fi

          # Granular: check each app group
          echo "$APP_CHANGES" | grep -qE '^apps/web/' && echo "deploy-web=true" >> $GITHUB_OUTPUT || echo "deploy-web=false" >> $GITHUB_OUTPUT
          echo "$APP_CHANGES" | grep -qE '^apps/example-' && echo "deploy-examples=true" >> $GITHUB_OUTPUT || echo "deploy-examples=false" >> $GITHUB_OUTPUT
          echo "$APP_CHANGES" | grep -qE '^apps/showcase/' && echo "deploy-showcase=true" >> $GITHUB_OUTPUT || echo "deploy-showcase=false" >> $GITHUB_OUTPUT

          echo "✅ Selective deploy based on changed paths:"
          echo "$APP_CHANGES" | head -10

  deploy:
    name: Deploy web
    needs: [preflight, lint, typecheck, test]
    if: needs.preflight.outputs.deploy-web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Install dependencies (cache miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        if: needs.preflight.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: needs.preflight.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials missing after secret resolution."
            exit 1
          fi

      - name: Run D1 migrations (remote)
        working-directory: apps/web
        run: |
          if [ -f "package.json" ]; then
            cmd=$(node -p "require('./package.json').scripts['db:migrate']?.replaceAll('--local', '--remote') || ''")
            if [ -n "$cmd" ]; then
              echo "Running remote migrations..."
              export PATH="$(pwd)/node_modules/.bin:$PATH"
              eval "$cmd"
            else
              echo "No db:migrate script found, skipping."
            fi
          fi

      - name: Build & Deploy
        working-directory: apps/web
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          pnpm build
          pnpm exec wrangler deploy

  deploy-examples:
    name: Deploy ${{ matrix.app }}
    needs: [preflight, lint, typecheck, test]
    if: needs.preflight.outputs.deploy-examples == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    strategy:
      fail-fast: false
      matrix:
        app:
          - example-auth
          - example-blog
          - example-marketing
          - example-og-image
          - example-apple-maps
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Install dependencies (cache miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        if: needs.preflight.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: needs.preflight.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials missing after secret resolution."
            exit 1
          fi

      - name: Run D1 migrations (remote)
        working-directory: apps/${{ matrix.app }}
        run: |
          if [ -f "package.json" ]; then
            cmd=$(node -p "require('./package.json').scripts['db:migrate']?.replaceAll('--local', '--remote') || ''")
            if [ -n "$cmd" ]; then
              echo "Running remote migrations for ${{ matrix.app }}..."
              export PATH="$(pwd)/node_modules/.bin:$PATH"
              eval "$cmd"
            else
              echo "No db:migrate script found for ${{ matrix.app }}, skipping."
            fi
          fi

      - name: Build & Deploy
        working-directory: apps/${{ matrix.app }}
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          pnpm build
          pnpm exec wrangler deploy

  deploy-showcase:
    name: Deploy showcase
    needs: [preflight, deploy-examples]
    if: needs.preflight.outputs.deploy-showcase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore workspace cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Install dependencies (cache miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        if: needs.preflight.outputs.method == 'doppler'
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Set direct Cloudflare credentials
        if: needs.preflight.outputs.method == 'direct'
        env:
          CF_API: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_API_TOKEN=$CF_API" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCOUNT" >> "$GITHUB_ENV"

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare credentials missing after secret resolution."
            exit 1
          fi

      - name: Run D1 migrations (remote)
        working-directory: apps/showcase
        run: |
          if [ -f "package.json" ]; then
            cmd=$(node -p "require('./package.json').scripts['db:migrate']?.replaceAll('--local', '--remote') || ''")
            if [ -n "$cmd" ]; then
              echo "Running remote migrations for showcase..."
              export PATH="$(pwd)/node_modules/.bin:$PATH"
              eval "$cmd"
            else
              echo "No db:migrate script found for showcase, skipping."
            fi
          fi

      - name: Build & Deploy
        working-directory: apps/showcase
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          pnpm build
          pnpm exec wrangler deploy
