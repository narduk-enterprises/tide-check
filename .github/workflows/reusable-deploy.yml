name: Reusable Deploy

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      app-directory:
        description: 'Relative path to the app directory (e.g., apps/web)'
        required: false
        type: string
        default: 'apps/web'
    secrets:
      DOPPLER_TOKEN:
        description: 'Doppler service token for secret resolution'
        required: true

jobs:
  check-changes:
    name: Check for deployable changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should-deploy: ${{ steps.changes.outputs.should-deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect app-relevant changes
        id: changes
        run: |
          # Files that do NOT require a deploy
          INFRA_ONLY_PATTERNS='\.github/|\.agents/|tools/|\.template-version|renovate\.json|turbo\.json|doppler\.yaml|\.gitignore|README|LICENSE|packages/eslint-config/'

          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FORCE_DEPLOY")

          if [ "$CHANGED" = "FORCE_DEPLOY" ]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "⚡ Force deploy (no parent commit or workflow_dispatch)"
          elif echo "$CHANGED" | grep -qvE "$INFRA_ONLY_PATTERNS"; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "✅ App-relevant changes detected:"
            echo "$CHANGED" | grep -vE "$INFRA_ONLY_PATTERNS" | head -10
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️ Only infra/tooling changes — skipping deploy"
            echo "$CHANGED" | head -10
          fi

  deploy:
    name: Deploy
    needs: [check-changes]
    if: needs.check-changes.outputs.should-deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Restore workspace cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            layers/*/node_modules
            packages/*/node_modules
            packages/eslint-config/*/node_modules
            apps/*/.nuxt
            layers/*/.nuxt
            packages/eslint-config/*/dist
            packages/eslint-config/eslint-plugin-nuxt-guardrails/dist
            packages/eslint-config/eslint-plugin-nuxt-ui/dist
            packages/eslint-config/eslint-plugin-vue-official-best-practices/dist
          key: workspace-${{ github.sha }}

      - name: Install dependencies (cache miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.3.1
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Validate Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID missing from Doppler. Check your Doppler project secrets."
            exit 1
          fi

      - name: Run D1 migrations (remote)
        working-directory: ${{ inputs.app-directory }}
        run: |
          if [ -f "package.json" ]; then
            cmd=$(node -p "require('./package.json').scripts['db:migrate']?.replaceAll('--local', '--remote') || ''")
            if [ -n "$cmd" ]; then
              echo "Running remote migrations..."
              export PATH="$(pwd)/node_modules/.bin:$PATH"
              eval "$cmd"
            else
              echo "No db:migrate script found, skipping."
            fi
          fi

      - name: Build & Deploy
        working-directory: ${{ inputs.app-directory }}
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          pnpm build
          pnpm exec wrangler deploy
