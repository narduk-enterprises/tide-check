name: Template Sync Bot

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview changes without creating PRs'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      # Verbatim-synced files
      - 'tools/update-layer.ts'
      - 'tools/check-drift-ci.ts'
      - 'tools/generate-favicons.ts'
      - 'tools/check-setup.cjs'
      - 'tools/sync-template.ts'
      - 'tools/validate.ts'
      - 'tools/init.ts'
      - '.github/workflows/weekly-drift-check.yml'
      - '.github/workflows/version-bump.yml'
      - '.github/workflows/reusable-quality.yml'
      - '.github/workflows/reusable-deploy.yml'
      - '.github/copilot-instructions.md'
      - 'turbo.json'
      - 'renovate.json'
      - 'packages/eslint-config/**'
      - 'apps/web/eslint.config.mjs'

concurrency:
  group: template-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Sync → ${{ matrix.repo }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        repo:
          - neon-sewer-raid
          - old-austin-grouch
          - ogpreview-app
          - imessage-dictionary
          - narduk-enterprises-portfolio
          - drift-map
          - tiny-invoice
          - enigma-box
          - papa-everetts-pizza
          - flashcard-pro
          - clawdle
          - circuit-breaker-online
          - nagolnagemluapleira
          - austin-texas-net
          # Add derived repos here as the fleet grows
      fail-fast: false

    steps:
      - name: Checkout template
        uses: actions/checkout@v4
        with:
          path: template

      - name: Checkout derived app
        uses: actions/checkout@v4
        with:
          repository: narduk-enterprises/${{ matrix.repo }}
          token: ${{ secrets.FLEET_SYNC_TOKEN }}
          path: app

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: template/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: template/pnpm-lock.yaml

      - name: Install template dependencies
        run: pnpm install --frozen-lockfile
        working-directory: template

      - name: Run sync-template
        working-directory: template
        run: pnpm exec tsx tools/sync-template.ts ${{ github.workspace }}/app

      - name: Check for changes
        id: changes
        working-directory: app
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected for ${{ matrix.repo }}"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Sync lockfile after template changes
        if: steps.changes.outputs.changed == 'true' && inputs.dry-run != true
        working-directory: app
        run: pnpm install --no-frozen-lockfile

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true' && inputs.dry-run != true
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.FLEET_SYNC_TOKEN }}
        run: |
          # Fixed branch name — force-push updates the existing PR's branch directly.
          # Previously used date-stamped branches (template-sync/YYYY-MM-DD) which
          # created orphan branches while only editing the old PR's body.
          BRANCH="template-sync"
          TEMPLATE_SHA="${{ github.sha }}"

          git config user.name "template-sync-bot"
          git config user.email "template-sync-bot@users.noreply.github.com"

          # Check if a PR already exists for the template-sync branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)

          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git add -A
          git commit --no-verify -m "chore: sync with template infra (${TEMPLATE_SHA:0:12})"
          git push -u origin "$BRANCH" --force

          PR_BODY="$(cat <<BODY
          ## Template Sync

          Auto-generated by the [template sync bot](https://github.com/narduk-enterprises/narduk-nuxt-template/actions/workflows/template-sync-bot.yml).
          Syncs infrastructure files from \`narduk-enterprises/narduk-nuxt-template@${TEMPLATE_SHA:0:12}\`.

          ### What gets synced
          - Tool scripts (update-layer, check-drift-ci, generate-favicons, check-setup)
          - CI/CD workflows (version-bump, reusable-quality, reusable-deploy)
          - Build orchestration (turbo.json)
          - Dependency management (renovate.json)
          - ESLint shared config and rules
          - Agent workflows (copy-if-missing only)
          - .npmrc and package.json scripts
          - .template-version sentinel

          ### Changed files
          \`\`\`
          $(cd ${{ github.workspace }}/app && git diff HEAD~1 --stat)
          \`\`\`

          > **Review carefully** before merging. Run \`pnpm install && pnpm run quality\` locally to verify.
          BODY
          )"

          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "✅ Updated existing PR #${EXISTING_PR} (force-pushed to $BRANCH)"
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
          else
            echo "✅ Creating new PR from $BRANCH"
            gh pr create \
              --title "chore: sync with template infra" \
              --body "$PR_BODY"
          fi
